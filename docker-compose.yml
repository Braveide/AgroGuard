
services:
  backend:
    build: .
    environment:
      - PORT=8000
      - HOST=0.0.0.0
      - DB_PATH=agroguard.db
      - ORIGEN_PERMITIDO=
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_KEY=${SUPABASE_ANON_KEY}
      - API_PUBLIC_KEY=${API_PUBLIC_KEY}
      - API_SECRET_KEY=${API_SECRET_KEY}
    env_file: .env
    ports:
      - "8000:8000"
    restart: always
    networks:
      - agroguard-net

  frontend:
    image: nginx:alpine
    ports:
      - "5500:80"          # ← Cambia a 5500 para coincidir con ORIGEN_PERMITIDO
    volumes:
      - ./index.html:/usr/share/nginx/html/index.html
      - ./:/usr/share/nginx/html
    depends_on:
      - backend
    networks:
      - agroguard-net

networks:
  agroguard-net:
    driver: bridge